name: Deploy Picare OMS Client

on:
  push:
    branches:
      - production

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/tritruong666/picare-oms-client:latest
          build-args: |
            VITE_OMS_API_URL=${{ secrets.VITE_OMS_API_URL }}
            VITE_HUB_API_URL=${{ secrets.VITE_HUB_API_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare VPS directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/projects/picare-oms/client

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/projects/picare-oms/client"
          overwrite: true

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/projects/picare-oms/client

            # Login để pull image mới
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Kéo image mới nhất về
            docker compose -p picare-oms-client pull

            # Chạy lại container (Không dùng 'down' để tránh mất kết nối lâu)
            # --remove-orphans đảm bảo xóa các container thừa không có trong file yml này
            docker compose -p picare-oms-client up -d --remove-orphans --force-recreate

            # Dọn dẹp image cũ để tránh đầy ổ cứng
            docker image prune -f
            
            # (Tùy chọn) Reload Nginx Gateway nếu cần cập nhật IP nội bộ
            # docker exec nginx-gateway nginx -s reload