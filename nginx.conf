# Template mồi(COPY ONLY)
server {
    listen 80;
    server_name hub.picare.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "Nginx is alive!";
    }
}
# Template sau khi có SSL(Cần nâng cấp)
server {
    listen 80;
    server_name hub.picare.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hub.picare.vn;

    ssl_certificate /etc/letsencrypt/live/hub.picare.vn/fullchain1.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.picare.vn/privkey1.pem;

    location / {
        proxy_pass http://picare-hub-client:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}